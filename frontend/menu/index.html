<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Cardápio Digital | SmartPede</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/menu.css">
</head>

<body>

    <!-- Loading Overlay -->
    <div id="loading" class="loading-screen">
        <div style="text-align: center;">
            <div class="restaurant-logo" style="width: 60px; height: 60px; font-size: 1.5rem;">SP</div>
            <p>Carregando Cardápio...</p>
        </div>
    </div>

    <!-- Header -->
    <header class="menu-header">
        <div id="logoContainer">
            <div class="restaurant-logo" id="restLogo">#</div>
        </div>
        <h1 class="restaurant-name" id="restName">Carregando...</h1>
        <div id="storeStatus" class="status-indicator">Verificando...</div>
        <p class="restaurant-info" id="restHours">Aberto agora • SmartPede</p>

        <div class="action-buttons" style="display: flex; gap: 10px; margin-top: 15px; justify-content: center;">
            <button class="btn-action" onclick="toggleStoreProfileModl(true)">🏢 Sobre a Loja</button>
            <button class="btn-action" onclick="toggleMyOrdersModal(true)">📋 Meus Pedidos</button>
        </div>
    </header>

    <!-- Store Profile Modal -->
    <div class="modal-overlay" id="profileModal" style="display: none;">
        <div class="modal-content glass-card">
            <div class="modal-header">
                <h3>Sobre a Loja</h3>
                <button onclick="toggleStoreProfileModl(false)">&times;</button>
            </div>
            <div class="modal-body">
                <div id="profileDetails">
                    <p id="restAddressModal"></p>
                    <div id="restMapsModal" style="margin: 10px 0;"></div>
                    <p id="restPhoneModal"></p>
                    <p id="restSlugModal" style="color: #666; font-size: 0.8rem;"></p>
                    <div style="margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px;">
                        <strong>Horários de Funcionamento:</strong>
                        <div id="restHoursTableModal" style="font-size: 0.85rem; margin-top: 5px;"></div>
                    </div>
                    <div style="margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px;">
                        <strong>Formas de Pagamento:</strong>
                        <p id="restPaymentsModal" style="font-size: 0.85rem; color: #666;"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- My Orders Modal -->
    <div class="modal-overlay" id="myOrdersModal" style="display: none;">
        <div class="modal-content glass-card">
            <div class="modal-header">
                <h3>Acompanhar Pedido</h3>
                <button onclick="toggleMyOrdersModal(false)">&times;</button>
            </div>
            <div class="modal-body" id="myOrdersList">
                <p class="text-secondary">Você ainda não realizou pedidos nesta sessão.</p>
            </div>
        </div>
    </div>

    <!-- Categories Nav -->
    <nav class="categories-nav" id="catNav">
        <!-- Categories will be injected here -->
    </nav>

    <!-- Menu Content -->
    <main id="menuContent">
        <!-- Products by category will be injected here -->
    </main>

    <!-- Floating Cart Bar -->
    <div class="cart-floating" id="cartFloating">
        <div class="cart-bar" onclick="openCart()">
            <span><span id="cartCount">0</span> itens no carrinho</span>
            <strong id="cartTotal">R$ 0,00</strong>
        </div>
    </div>

    <!-- Cart Modal -->
    <div class="cart-modal" id="cartModal">
        <div class="cart-modal-header">
            <h2>Meu Pedido</h2>
            <button onclick="closeCart()" style="background: none; border: none; font-size: 1.5rem;">&times;</button>
        </div>

        <div class="cart-items-list" id="cartItemsList">
            <!-- Cart items injected here -->
        </div>

        <div class="cart-footer">
            <div style="margin-bottom: 1.5rem;">
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" id="custName" placeholder="Seu nome completo"
                        style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px;">
                </div>
                <div class="form-group">
                    <label>Telefone</label>
                    <input type="tel" id="custPhone" placeholder="(00) 00000-0000"
                        style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px;">
                </div>

                <!-- v3 Delivery Options -->
                <div class="form-group">
                    <label>Como deseja receber?</label>
                    <select id="fulfillmentType" onchange="toggleAddressFields()"
                        style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid #ddd;">
                        <option value="dine_in" selected>Consumo no Local</option>
                        <option value="pickup">Retirada no Local</option>
                        <option value="delivery">Delivery</option>
                    </select>
                </div>

                <div id="addressFields">
                    <div class="form-group">
                        <label>Rua</label>
                        <input type="text" id="custStreet" placeholder="Nome da rua"
                            style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px;">
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div class="form-group">
                            <label>Número</label>
                            <input type="text" id="custNumber" placeholder="123"
                                style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px;">
                        </div>
                        <div class="form-group">
                            <label>Bairro</label>
                            <input type="text" id="custDistrict" placeholder="Centro"
                                style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px;">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Complemento</label>
                        <input type="text" id="custComplement" placeholder="Apto, Bloco, etc (opcional)"
                            style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px;">
                    </div>
                </div>

                <div class="form-group">
                    <label>Forma de Pagamento</label>
                    <select id="paymentMethod"
                        style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid #ddd;">
                        <option value="pix">Pix</option>
                        <option value="card">Cartão (Crédito/Débito)</option>
                        <option value="money">Dinheiro</option>
                    </select>
                </div>
            </div>

            <div
                style="display: flex; justify-content: space-between; margin-bottom: 1rem; font-size: 1.2rem; font-weight: 700;">
                <span>Total:</span>
                <span id="modalTotal">R$ 0,00</span>
            </div>

            <button class="btn-checkout" id="checkoutBtn" onclick="checkout()">Finalizar Pedido pelo WhatsApp</button>
        </div>
    </div>

    <script src="./js/menu.js"></script>
</body>

</html>
