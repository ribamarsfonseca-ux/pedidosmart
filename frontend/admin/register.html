<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Restaurante | SmartPedidos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body class="auth-container">

    <div class="auth-card">
        <h1>Crie seu Restaurante</h1>
        <p class="subtitle">Em minutos você começa a receber pedidos.</p>

        <!-- Alert Box -->
        <div id="alertBox" class="alert"></div>

        <form id="registerForm">
            <div class="form-group">
                <label for="tenantName">Nome do Estabelecimento</label>
                <input type="text" id="tenantName" name="tenantName" placeholder="Ex: Pizzaria do Mario" required
                    autofocus>
            </div>

            <div class="form-group">
                <label for="slug">URL do Cardápio</label>
                <input type="text" id="slug" name="slug" placeholder="meu-menu/pizzaria-do-mario" required>
                <small style="color: var(--text-secondary); font-size: 0.75rem; margin-top: 4px; display: block;">Sem
                    espaços ou caracteres especiais.</small>
            </div>

            <div class="form-group">
                <label for="adminEmail">Seu E-mail (Acesso Admin)</label>
                <input type="email" id="adminEmail" name="adminEmail" placeholder="admin@pizzaria.com" required>
            </div>

            <div class="form-group">
                <label for="adminPassword">Senha Segura</label>
                <input type="password" id="adminPassword" name="adminPassword" placeholder="••••••••" required
                    minlength="6">
            </div>

            <button type="submit" class="btn btn-primary mt-4" id="registerBtn">Iniciar Teste Grátis</button>
        </form>

        <div class="text-center mt-4" style="margin-top: 2rem; font-size: 0.875rem;">
            <p>Já possui cadastro? <a href="index.html" class="link">Fazer Login</a></p>
        </div>
    </div>

    <script src="./js/auth-api.js"></script>
</body>

</html>
