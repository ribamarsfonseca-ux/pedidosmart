<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDV Profissional | SmartPede</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --success: #10b981;
            --dark: #0f172a;
            --light: #f8fafc;
            --white: #fff;
            --gray: #64748b;
            --border: #e2e8f0;
            --radius-lg: 16px;
            --radius-md: 12px;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--light);
            color: var(--dark);
            overflow: hidden;
            height: 100vh;
        }

        /* Login Screen */
        #login-screen {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e293b, #0f172a);
        }

        .login-box {
            background: var(--white);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
        }

        /* PDV Layout */
        #main-pdv {
            display: none;
            height: 100vh;
            display: grid;
            grid-template-columns: 1fr 400px;
            grid-template-rows: 70px 1fr;
        }

        .header {
            grid-column: 1 / -1;
            background: var(--white);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
        }

        .pdv-container {
            grid-column: 1;
            padding: 1.5rem;
            overflow-y: auto;
            background: #f1f5f9;
        }

        .cart-sidebar {
            grid-column: 2;
            background: var(--white);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* Catalog Styles */
        .search-box {
            position: sticky;
            top: 0;
            background: #f1f5f9;
            padding-bottom: 1.5rem;
            z-index: 10;
        }

        .search-input {
            width: 100%;
            padding: 1rem 1.5rem;
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 1.1rem;
            outline: none;
            transition: 0.2s;
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.25rem;
        }

        .product-card {
            background: var(--white);
            border-radius: var(--radius-md);
            padding: 1rem;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: var(--shadow);
        }

        .product-card:hover {
            transform: translateY(-3px);
            border-color: var(--primary);
        }

        .product-img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            background: #eee;
        }

        .product-info h4 {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .product-info p {
            font-size: 0.85rem;
            color: var(--gray);
            line-height: 1.2;
            height: 32px;
            overflow: hidden;
        }

        .product-price {
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--primary);
            margin-top: auto;
        }

        /* Cart Styles */
        .cart-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            padding-bottom: 10px;
            border-bottom: 1px dashed var(--border);
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-info h5 {
            font-size: 0.95rem;
            margin-bottom: 2px;
        }

        .cart-item-qty {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 5px;
        }

        .qty-btn {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--white);
            cursor: pointer;
            font-size: 0.8rem;
        }

        .cart-footer {
            padding: 1.5rem;
            background: #f8fafc;
            border-top: 1px solid var(--border);
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 1.25rem;
            font-weight: 800;
        }

        /* Form elements */
        .btn {
            padding: 0.8rem 1.5rem;
            border-radius: var(--radius-md);
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-success {
            background: var(--success);
            color: white;
            font-size: 1.2rem;
            padding: 1.2rem;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--gray);
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--gray);
            text-transform: uppercase;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.8rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            outline: none;
        }

        /* Utils */
        .badge-live {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--success);
        }

        .dot {
            height: 8px;
            width: 8px;
            background: var(--success);
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.9);
            }

            70% {
                transform: scale(1.1);
                opacity: 0.5;
            }

            100% {
                transform: scale(0.9);
            }
        }

        #pdv-clock {
            font-weight: 600;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <!-- TELA DE LOGIN -->
    <div id="login-screen">
        <div class="login-box">
            <h1 style="text-align: center; margin-bottom: 0.5rem;">🚀 SmartPede</h1>
            <p style="text-align: center; color: var(--gray); margin-bottom: 2.5rem;">Acesse o Frente de Caixa
                Profissional</p>
            <form onsubmit="handlePDVLogin(event)">
                <div class="form-group">
                    <label>URL DA LOJA (SLUG)</label>
                    <input type="text" id="pdv-slug" placeholder="ex: pizzaria-do-ze" required>
                </div>
                <div class="form-group">
                    <label>SENHA DO PDV</label>
                    <input type="password" id="pdv-pass" placeholder="Definida nas configurações do Admin" required>
                </div>
                <button type="submit" class="btn btn-primary" style="padding: 1.2rem;">ENTRAR NO TERMINAL</button>
            </form>
        </div>
    </div>

    <!-- TELA PRINCIPAL PDV -->
    <div id="main-pdv" style="display: none;">
        <header class="header">
            <div style="display: flex; align-items: center; gap: 20px;">
                <h3 id="pdv-store-name" style="font-weight: 800; font-size: 1.4rem; color: var(--primary);">MINHA LOJA
                </h3>
                <div id="pdv-clock" class="text-secondary">00:00:00</div>
            </div>
            <div style="display: flex; align-items: center; gap: 20px;">
                <div class="badge-live"><span class="dot"></span> TERMINAL ATIVO</div>
                <button onclick="logoutPDV()" class="btn btn-outline"
                    style="width: auto; padding: 0.5rem 1rem;">SAIR</button>
            </div>
        </header>

        <section class="pdv-container">
            <div class="search-box">
                <input type="text" id="pdv-search" class="search-input"
                    placeholder="🔍 Buscar produto por nome ou código..." onkeyup="filterProducts()">
            </div>
            <div id="product-grid" class="product-grid">
                <!-- Produtos renderizados aqui via JS -->
                <p>Carregando catálogo...</p>
            </div>
        </section>

        <aside class="cart-sidebar">
            <div class="cart-header">
                <h3>🛒 Carrinho de Venda</h3>
                <button class="btn btn-outline" style="width: auto; padding: 5px 10px; font-size: 0.75rem;"
                    onclick="clearCart()">Limpar</button>
            </div>

            <div id="cart-items" class="cart-items">
                <p class="text-secondary" style="text-align: center; margin-top: 2rem;">Carrinho Vazio</p>
            </div>

            <div class="cart-footer">
                <div class="form-group">
                    <label>CLIENTE (OPCIONAL)</label>
                    <input type="text" id="cart-customer" placeholder="Nome do cliente">
                </div>
                <div class="form-group">
                    <label>FORMA DE PAGAMENTO</label>
                    <select id="cart-payment">
                        <option value="money">Dinheiro</option>
                        <option value="pix">PIX</option>
                        <option value="card">Cartão</option>
                    </select>
                </div>
                <div class="total-row">
                    <span>TOTAL</span>
                    <span id="cart-total">R$ 0,00</span>
                </div>
                <button class="btn btn-success" onclick="finishOrder()">FINALIZAR VENDA (F10)</button>
            </div>
        </aside>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const API_URL = '/api';
        let products = [];
        let cart = [];
        let tenant = null;
        let socket;

        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('pdv_token');
            if (token) {
                showMain();
            }
            setInterval(() => {
                document.getElementById('pdv-clock').textContent = new Date().toLocaleTimeString();
            }, 1000);
        });

        // Shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F10') {
                e.preventDefault();
                finishOrder();
            }
        });

        async function handlePDVLogin(e) {
            e.preventDefault();
            const slug = document.getElementById('pdv-slug').value.trim();
            const pdvPassword = document.getElementById('pdv-pass').value.trim();

            try {
                const res = await fetch(`${API_URL}/tenants/pdv/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ slug: slug.toLowerCase(), pdvPassword })
                });

                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('pdv_token', data.token);
                    localStorage.setItem('pdv_tenant', JSON.stringify(data.tenant));
                    showMain();
                } else {
                    alert('Credenciais inválidas. Verifique no painel admin.');
                }
            } catch (err) { alert('Erro na conexão com o servidor.'); }
        }

        async function showMain() {
            tenant = JSON.parse(localStorage.getItem('pdv_tenant'));
            document.getElementById('pdv-store-name').textContent = tenant.name.toUpperCase();
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-pdv').style.display = 'grid';

            setupSocket();
            await loadProducts();
        }

        function setupSocket() {
            if (typeof io === 'undefined') return;
            socket = io();
            socket.emit('join-tenant', tenant.id);
            socket.on('new-order', () => {
                // Notificar sobre novos pedidos online se necessário
                console.log('Novo pedido online recebido!');
            });
        }

        async function loadProducts() {
            try {
                const token = localStorage.getItem('pdv_token');
                const res = await fetch(`${API_URL}/products`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    products = await res.json();
                    renderProducts(products);
                }
            } catch (e) { console.error('Erro ao carregar produtos'); }
        }

        function renderProducts(list) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = list.map(p => `
                <div class="product-card" onclick="addToCart(${p.id})">
                    ${p.imageUrl ? `<img src="${p.imageUrl}" class="product-img">` : '<div class="product-img" style="display:flex;align-items:center;justify-content:center;color:#ccc">S/ FOTO</div>'}
                    <div class="product-info">
                        <h4>${p.name}</h4>
                        <p>${p.description || ''}</p>
                        <div class="product-price">${p.price.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}</div>
                    </div>
                </div>
            `).join('');
        }

        function filterProducts() {
            const term = document.getElementById('pdv-search').value.toLowerCase();
            const filtered = products.filter(p =>
                p.name.toLowerCase().includes(term) ||
                (p.description && p.description.toLowerCase().includes(term))
            );
            renderProducts(filtered);
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existing = cart.find(item => item.id === productId);

            if (existing) {
                existing.qty++;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            renderCart();
        }

        function updateQty(id, delta) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.qty += delta;
                if (item.qty <= 0) {
                    cart = cart.filter(i => i.id !== id);
                }
                renderCart();
            }
        }

        function renderCart() {
            const list = document.getElementById('cart-items');
            if (cart.length === 0) {
                list.innerHTML = '<p class="text-secondary" style="text-align: center; margin-top: 2rem;">Carrinho Vazio</p>';
                document.getElementById('cart-total').textContent = 'R$ 0,00';
                return;
            }

            let total = 0;
            list.innerHTML = cart.map(item => {
                const subtotal = item.price * item.qty;
                total += subtotal;
                return `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <h5>${item.name}</h5>
                            <span style="font-size: 0.85rem; font-weight: 700; color: var(--primary);">${item.price.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}</span>
                            <div class="cart-item-qty">
                                <button class="qty-btn" onclick="updateQty(${item.id}, -1)">-</button>
                                <span>${item.qty}</span>
                                <button class="qty-btn" onclick="updateQty(${item.id}, 1)">+</button>
                            </div>
                        </div>
                        <div style="font-weight: 700;">${subtotal.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}</div>
                    </div>
                `;
            }).join('');

            document.getElementById('cart-total').textContent = total.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        function clearCart() {
            if (confirm('Deseja limpar o carrinho?')) {
                cart = [];
                renderCart();
            }
        }

        async function finishOrder() {
            if (cart.length === 0) return alert('O carrinho está vazio!');

            const btn = document.querySelector('.btn-success');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'FINALIZANDO...';

            const payload = {
                tenantId: tenant.id,
                customerName: document.getElementById('cart-customer').value || 'Cliente Balcão',
                customerPhone: '0000000000',
                fulfillmentType: 'counter', // Venda direta/balcão
                paymentMethod: document.getElementById('cart-payment').value,
                items: cart.map(i => ({ productId: i.id, quantity: i.qty }))
            };

            try {
                const token = localStorage.getItem('pdv_token');
                const res = await fetch(`${API_URL}/orders`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    alert('✅ Venda realizada com sucesso!');
                    cart = [];
                    document.getElementById('cart-customer').value = '';
                    renderCart();
                    // Opcional: imprimir recibo aqui automaticamente no futuro
                } else {
                    const err = await res.json();
                    alert('Erro: ' + err.error);
                }
            } catch (e) { alert('Erro ao finalizar venda.'); }
            finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        }

        function logoutPDV() {
            localStorage.removeItem('pdv_token');
            localStorage.removeItem('pdv_tenant');
            window.location.reload();
        }
    </script>
</body>

</html>
