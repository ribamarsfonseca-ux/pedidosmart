<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDV - Frente de Caixa | SmartPede</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --dark: #0f172a;
            --light: #f8fafc;
            --white: #fff;
            --gray: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--light);
            color: var(--dark);
        }

        /* Login State */
        #login-screen {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e293b, #0f172a);
        }

        .login-box {
            background: var(--white);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
        }

        /* Main State */
        #main-pdv {
            display: none;
            padding: 1.5rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--white);
            padding: 1.5rem;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .stat-card h3 {
            font-size: 0.875rem;
            color: var(--gray);
            margin-bottom: 5px;
        }

        .stat-card p {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--dark);
        }

        .card {
            background: var(--white);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 1.5rem;
        }

        .orders-list {
            display: grid;
            gap: 1rem;
        }

        .order-item {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn {
            padding: 0.75rem 1.25rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #e2e8f0;
            color: var(--gray);
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            margin-bottom: 1rem;
            font-size: 1rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--gray);
        }
    </style>
</head>

<body>

    <!-- TELA DE LOGIN -->
    <div id="login-screen">
        <div class="login-box">
            <h2 style="margin-bottom: 0.5rem; text-align: center;">🚀 PDV SmartPede</h2>
            <p style="text-align: center; color: var(--gray); font-size: 0.9rem; margin-bottom: 2rem;">Acesse o frente
                de caixa da sua loja</p>
            <form onsubmit="handlePDVLogin(event)">
                <label>URL da Loja (Slug)</label>
                <input type="text" id="pdv-slug" placeholder="ex: pizzaria-do-ze" required>
                <label>Senha do PDV</label>
                <input type="password" id="pdv-pass" placeholder="Defunida nas configurações" required>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">Entrar no PDV</button>
            </form>
        </div>
    </div>

    <!-- TELA PRINCIPAL PDV -->
    <div id="main-pdv">
        <header class="header">
            <div>
                <h2 id="pdv-store-name">Minha Loja</h2>
                <p id="pdv-clock" style="color: var(--gray); font-size: 0.85rem;"></p>
            </div>
            <div style="display: flex; gap: 10px;">
                <button onclick="copyLink()" class="btn btn-outline">🔗 Copiar Link</button>
                <button onclick="logoutPDV()" class="btn btn-outline">Sair</button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card" style="border-left: 5px solid #f59e0b;">
                <h3>Pendentes</h3>
                <p id="stat-pending">0</p>
            </div>
            <div class="stat-card" style="border-left: 5px solid #3b82f6;">
                <h3>Em Aberto</h3>
                <p id="stat-open">0</p>
            </div>
            <div class="stat-card" style="border-left: 5px solid #10b981;">
                <h3>Finalizados</h3>
                <p id="stat-finished">0</p>
            </div>
            <div class="stat-card" style="border-left: 5px solid #8b5cf6;">
                <h3>Vendas Hoje</h3>
                <p id="stat-sales">R$ 0,00</p>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-bottom: 1.5rem;">Pedidos Recentes</h3>
            <div id="pdv-orders-list" class="orders-list">
                <p style="color: var(--gray);">Carregando pedidos...</p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        let currentTenant = null;

        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('pdv_token');
            if (token) {
                showMain();
            }
            setInterval(updateClock, 1000);
            updateClock();
        });

        function updateClock() {
            const now = new Date();
            document.getElementById('pdv-clock').textContent = now.toLocaleString('pt-BR');
        }

        async function handlePDVLogin(e) {
            e.preventDefault();
            const slug = document.getElementById('pdv-slug').value.trim();
            const pdvPassword = document.getElementById('pdv-pass').value.trim();

            try {
                const res = await fetch(`${API_URL}/tenants/pdv/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ slug, pdvPassword })
                });

                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('pdv_token', data.token);
                    localStorage.setItem('pdv_tenant', JSON.stringify(data.tenant));
                    showMain();
                } else {
                    alert('Erro: ' + data.error);
                }
            } catch (err) { alert('Erro na conexão.'); }
        }

        function showMain() {
            currentTenant = JSON.parse(localStorage.getItem('pdv_tenant'));
            document.getElementById('pdv-store-name').textContent = currentTenant.name;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-pdv').style.display = 'block';
            loadStats();
            loadOrders();
            setInterval(loadStats, 30000); // Auto-refresh metrics
        }

        async function loadStats() {
            try {
                const token = localStorage.getItem('pdv_token');
                const res = await fetch(`${API_URL}/tenants/pdv/stats`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const stats = await res.json();
                    document.getElementById('stat-pending').textContent = stats.pending;
                    document.getElementById('stat-open').textContent = stats.open;
                    document.getElementById('stat-finished').textContent = stats.finished;
                    document.getElementById('stat-sales').textContent = stats.todaySales.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                }
            } catch (e) { }
        }

        async function loadOrders() {
            try {
                const token = localStorage.getItem('pdv_token');
                const res = await fetch(`${API_URL}/orders`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const orders = await res.json();
                    const list = document.getElementById('pdv-orders-list');
                    if (orders.length === 0) {
                        list.innerHTML = '<p style="color: var(--gray);">Nenhum pedido hoje.</p>';
                        return;
                    }
                    list.innerHTML = orders.slice(0, 10).map(o => `
                        <div class="order-item">
                            <div>
                                <strong>#${o.orderNumber || o.id} - ${o.customerName}</strong>
                                <p style="font-size: 0.8rem; color: var(--gray);">${o.totalAmount.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}</p>
                            </div>
                            <span style="font-size: 0.75rem; background: #e2e8f0; padding: 4px 8px; border-radius: 6px;">${o.status}</span>
                        </div>
                    `).join('');
                }
            } catch (e) { }
        }

        function copyLink() {
            const url = `${window.location.origin}/menu/#${currentTenant.slug}`;
            navigator.clipboard.writeText(url);
            alert('Link do cardápio copiado!');
        }

        function logoutPDV() {
            localStorage.removeItem('pdv_token');
            localStorage.removeItem('pdv_tenant');
            window.location.reload();
        }
    </script>
</body>

</html>
