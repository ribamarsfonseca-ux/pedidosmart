<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDV Profissional | SmartPede</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --success: #10b981;
            --dark: #0f172a;
            --light: #f8fafc;
            --white: #fff;
            --gray: #64748b;
            --border: #e2e8f0;
            --radius-lg: 16px;
            --radius-md: 12px;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--light);
            color: var(--dark);
            overflow: hidden;
            height: 100vh;
        }

        /* Login Screen */
        #login-screen {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e293b, #0f172a);
        }

        .login-box {
            background: var(--white);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
        }

        /* PDV Layout */
        #main-pdv {
            display: none;
            height: 100vh;
            display: grid;
            grid-template-columns: 1fr 400px;
            grid-template-rows: 70px 1fr;
        }

        /* Mobile Adjustments */
        @media (max-width: 992px) {
            #main-pdv {
                grid-template-columns: 1fr;
                grid-template-rows: 70px 1fr 60px;
                /* Header, Content, Mobile Nav */
            }

            .cart-sidebar {
                display: none;
                /* Hide by default on mobile */
                position: fixed;
                top: 70px;
                left: 0;
                width: 100%;
                height: calc(100vh - 130px);
                z-index: 100;
                border-left: none;
            }

            .cart-sidebar.active {
                display: flex;
            }

            .pdv-container {
                padding: 1rem;
            }

            .product-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 0.75rem;
            }

            .product-img {
                height: 100px;
            }

            .header {
                padding: 0 1rem;
            }

            #pdv-store-name {
                font-size: 1.1rem !important;
            }

            .pdv-mobile-nav {
                display: flex !important;
                grid-row: 3;
                background: var(--white);
                border-top: 1px solid var(--border);
                align-items: center;
                justify-content: space-around;
            }
        }

        .pdv-mobile-nav {
            display: none;
        }

        .mobile-nav-btn {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--gray);
            cursor: pointer;
            border: none;
            background: none;
        }

        .mobile-nav-btn.active {
            color: var(--primary);
            border-top: 3px solid var(--primary);
        }

        .header {
            grid-column: 1 / -1;
            background: var(--white);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
        }

        .pdv-container {
            grid-column: 1;
            padding: 1.5rem;
            overflow-y: auto;
            background: #f1f5f9;
        }

        .cart-sidebar {
            grid-column: 2;
            background: var(--white);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* Catalog Styles */
        .search-box {
            position: sticky;
            top: 0;
            background: #f1f5f9;
            padding-bottom: 1.5rem;
            z-index: 10;
        }

        .search-input {
            width: 100%;
            padding: 1rem 1.5rem;
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 1.1rem;
            outline: none;
            transition: 0.2s;
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.25rem;
        }

        .product-card {
            background: var(--white);
            border-radius: var(--radius-md);
            padding: 1rem;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: var(--shadow);
        }

        .product-card:hover {
            transform: translateY(-3px);
            border-color: var(--primary);
        }

        .product-img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            background: #eee;
        }

        .product-info h4 {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .product-info p {
            font-size: 0.85rem;
            color: var(--gray);
            line-height: 1.2;
            height: 32px;
            overflow: hidden;
        }

        .product-price {
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--primary);
            margin-top: auto;
        }

        /* Category Tabs */
        .category-tabs {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 1rem;
            margin-bottom: 1rem;
            scrollbar-width: none;
        }

        .category-tab {
            padding: 0.6rem 1.2rem;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 100px;
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: 0.2s;
        }

        .category-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Cart Styles */
        .cart-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            padding-bottom: 10px;
            border-bottom: 1px dashed var(--border);
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-info h5 {
            font-size: 0.95rem;
            margin-bottom: 2px;
        }

        .cart-item-qty {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 5px;
        }

        .qty-btn {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--white);
            cursor: pointer;
            font-size: 0.8rem;
        }

        .cart-footer {
            padding: 1.5rem;
            background: #f8fafc;
            border-top: 1px solid var(--border);
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 1.25rem;
            font-weight: 800;
        }

        /* Form elements */
        .btn {
            padding: 0.8rem 1.5rem;
            border-radius: var(--radius-md);
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-success {
            background: var(--success);
            color: white;
            font-size: 1.2rem;
            padding: 1.2rem;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--gray);
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--gray);
            text-transform: uppercase;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.8rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            outline: none;
        }

        /* Utils */
        .badge-live {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--success);
        }

        .dot {
            height: 8px;
            width: 8px;
            background: var(--success);
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.9);
            }

            70% {
                transform: scale(1.1);
                opacity: 0.5;
            }

            100% {
                transform: scale(0.9);
            }
        }

        #pdv-clock {
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* Cash Modals */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--white);
            border-radius: 20px;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .modal-header {
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .modal-footer {
            margin-top: 1.5rem;
            display: flex;
            gap: 10px;
        }
    </style>
</head>

<body>
    <!-- TELA DE LOGIN -->
    <div id="login-screen">
        <div class="login-box">
            <h1 style="text-align: center; margin-bottom: 0.5rem;">🚀 SmartPede</h1>
            <p style="text-align: center; color: var(--gray); margin-bottom: 2.5rem;">Acesse o Frente de Caixa
                Profissional</p>
            <form onsubmit="handlePDVLogin(event)">
                <div class="form-group">
                    <label>URL DA LOJA (SLUG)</label>
                    <input type="text" id="pdv-slug" placeholder="ex: pizzaria-do-ze" required>
                </div>
                <div class="form-group">
                    <label>SENHA DO PDV</label>
                    <input type="password" id="pdv-pass" placeholder="Definida nas configurações do Admin" required>
                </div>
                <button type="submit" class="btn btn-primary" style="padding: 1.2rem;">ENTRAR NO TERMINAL</button>
            </form>
        </div>
    </div>

    <!-- TELA PRINCIPAL PDV -->
    <div id="main-pdv" style="display: none;">
        <header class="header">
            <div style="display: flex; align-items: center; gap: 20px;">
                <h3 id="pdv-store-name" style="font-weight: 800; font-size: 1.4rem; color: var(--primary);">MINHA LOJA
                </h3>
                <div id="pdv-clock" class="text-secondary">00:00:00</div>
            </div>
            <div style="display: flex; align-items: center; gap: 20px;">
                <div class="badge-live"><span class="dot"></span> TERMINAL ATIVO</div>
                <button onclick="openCashModal('outflow')" class="btn btn-outline"
                    style="width: auto; padding: 0.5rem 1rem; color: #ef4444; border-color: #fecaca;">SANGRIA</button>
                <button onclick="openCashModal('inflow')" class="btn btn-outline"
                    style="width: auto; padding: 0.5rem 1rem; color: #10b981; border-color: #d1fae5;">REFORÇO</button>
                <button onclick="logoutPDV()" class="btn btn-outline"
                    style="width: auto; padding: 0.5rem 1rem;">SAIR</button>
            </div>
        </header>

        <section class="pdv-container">
            <div class="search-box">
                <input type="text" id="pdv-search" class="search-input"
                    placeholder="🔍 Buscar produto por nome ou código..." onkeyup="filterProducts()">
            </div>

            <div id="category-tabs" class="category-tabs">
                <!-- Categorias injetadas aqui -->
            </div>

            <div id="product-grid" class="product-grid">
                <!-- Produtos renderizados aqui via JS -->
                <p>Carregando catálogo...</p>
            </div>
        </section>

        <aside class="cart-sidebar">
            <div class="cart-header">
                <h3>🛒 Carrinho de Venda</h3>
                <button class="btn btn-outline" style="width: auto; padding: 5px 10px; font-size: 0.75rem;"
                    onclick="clearCart()">Limpar</button>
            </div>

            <div id="cart-items" class="cart-items">
                <p class="text-secondary" style="text-align: center; margin-top: 2rem;">Carrinho Vazio</p>
            </div>

            <div class="cart-footer" style="border-top: 1px solid #eee; padding-top: 15px;">
                <div class="form-group">
                    <label>MESA / LOCAL</label>
                    <select id="cart-table" onchange="handleTableSelection()">
                        <option value="">Venda Direta (Balcão)</option>
                    </select>
                </div>
                <div id="table-status-info"
                    style="display: none; margin-bottom: 1rem; font-size: 0.85rem; padding: 10px; border-radius: 8px;">
                    <!-- Info da mesa ocupada aqui -->
                </div>
                <div class="form-group">
                    <label>CLIENTE (OPCIONAL)</label>
                    <input type="text" id="cart-customer" placeholder="Nome do cliente">
                </div>
                <div class="form-group">
                    <label>FORMA DE PAGAMENTO</label>
                    <select id="cart-payment">
                        <option value="money">Dinheiro</option>
                        <option value="pix">PIX</option>
                        <option value="card">Cartão</option>
                    </select>
                </div>
                <div class="total-row">
                    <span>TOTAL</span>
                    <span id="cart-total">R$ 0,00</span>
                </div>
                <div class="form-group">
                    <label>VALOR RECEBIDO (DINHEIRO)</label>
                    <input type="number" id="cash-received" placeholder="0,00" oninput="calculateChange()">
                </div>
                <div id="change-display"
                    style="display: none; margin-bottom: 1rem; padding: 10px; background: #d1fae5; border-radius: 8px; font-weight: 700; color: #065f46; text-align: center;">
                    TROCO: <span id="cart-change">R$ 0,00</span>
                </div>
                <button id="btn-finish" class="btn btn-success" onclick="finishOrder()">FINALIZAR VENDA (F10)</button>
                <button id="btn-kitchen" class="btn btn-primary" style="display: none; margin-top: 10px;"
                    onclick="sendToKitchen()">ENVIAR PARA COZINHA</button>
            </div>
        </aside>

        <nav class="pdv-mobile-nav">
            <button class="mobile-nav-btn active" id="btn-nav-catalog" onclick="switchMobileTab('catalog')">
                <span style="font-size: 1.2rem;">📖</span>
                Cardápio
            </button>
            <button class="mobile-nav-btn" id="btn-nav-cart" onclick="switchMobileTab('cart')">
                <div style="position: relative;">
                    <span style="font-size: 1.2rem;">🛒</span>
                    <span id="mobile-cart-badge"
                        style="position: absolute; top: -5px; right: -8px; background: var(--primary); color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 0.65rem; display: flex; align-items: center; justify-content: center;">0</span>
                </div>
                Carrinho
            </button>
        </nav>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const API_URL = window.location.origin + '/api';

        const formatImageUrl = (url) => {
            if (!url) return '';
            url = url.trim();
            if (url.startsWith('http://') || url.startsWith('https://') || url.startsWith('data:image')) {
                return url;
            }
            return 'https://' + url;
        };
        let products = [];
        let categories = [];
        let currentCategoryId = 'all';
        let cart = [];
        let tenant = null;
        let socket;
        let currentTableOrderIds = [];

        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('pdv_token');
            if (token) {
                showMain();
            }
            setInterval(() => {
                document.getElementById('pdv-clock').textContent = new Date().toLocaleTimeString();
            }, 1000);
        });

        function switchMobileTab(tab) {
            const container = document.querySelector('.pdv-container');
            const cartSidebar = document.querySelector('.cart-sidebar');
            const btnNavCatalog = document.getElementById('btn-nav-catalog');
            const btnNavCart = document.getElementById('btn-nav-cart');

            if (tab === 'cart') {
                container.style.display = 'none';
                cartSidebar.classList.add('active');
                btnNavCart.classList.add('active');
                btnNavCatalog.classList.remove('active');
            } else {
                container.style.display = 'block';
                cartSidebar.classList.remove('active');
                btnNavCatalog.classList.add('active');
                btnNavCart.classList.remove('active');
            }
        }

        // Shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F10') {
                e.preventDefault();
                finishOrder();
            }
        });

        async function handlePDVLogin(e) {
            e.preventDefault();
            const slug = document.getElementById('pdv-slug').value.trim();
            const pdvPassword = document.getElementById('pdv-pass').value.trim();

            try {
                const res = await fetch(`${API_URL}/tenants/pdv/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ slug: slug.toLowerCase(), pdvPassword })
                });

                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('pdv_token', data.token);
                    localStorage.setItem('pdv_tenant', JSON.stringify(data.tenant));
                    showMain();
                } else {
                    alert('Credenciais inválidas. Verifique no painel admin.');
                }
            } catch (err) { alert('Erro na conexão com o servidor.'); }
        }

        async function showMain() {
            tenant = JSON.parse(localStorage.getItem('pdv_tenant'));
            document.getElementById('pdv-store-name').textContent = tenant.name.toUpperCase();
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-pdv').style.display = 'grid';

            setupSocket();
            await loadProducts();
            await loadTables();
        }

        function setupSocket() {
            if (typeof io === 'undefined') return;
            socket = io();
            socket.emit('join-tenant', tenant.id);
            socket.on('new-order', (order) => {
                console.log('Novo pedido recebido no PDV:', order);
                // Notificar sobre novos pedidos online se necessário
            });
            socket.on('order-updated', (order) => {
                console.log('Pedido atualizado no PDV:', order);
                loadTables(); // Refresh table statuses
            });
        }

        async function loadProducts() {
            try {
                const token = localStorage.getItem('pdv_token');

                // Load Categories first
                const catRes = await fetch(`${API_URL}/categories`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (catRes.ok) {
                    categories = await catRes.json();
                    renderCategories();
                }

                // Load Products
                const res = await fetch(`${API_URL}/products`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    products = await res.json();
                    renderProducts(); // Render with current filters
                }
            } catch (e) { console.error('Erro ao carregar dados'); }
        }

        async function loadTableOrder(tableId) {
            try {
                const token = localStorage.getItem('pdv_token');
                const res = await fetch(`${API_URL}/orders?status=active&tableId=${tableId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const activeOrders = await res.json();
                    if (activeOrders.length > 0) {
                        const combinedItems = [];
                        activeOrders.forEach(order => {
                            order.items.forEach(item => {
                                const prod = products.find(p => p.id === item.productId);
                                if (prod) {
                                    combinedItems.push({
                                        ...prod,
                                        qty: item.quantity,
                                        price: item.unitPrice,
                                        fromOrder: true
                                    });
                                }
                            });
                        });
                        currentTableOrderIds = activeOrders.map(o => o.id);
                        cart = combinedItems;
                        renderCart();
                    }
                }
            } catch (e) { console.error('Erro ao carregar consumo da mesa'); }
        }

        function renderCategories() {
            const container = document.getElementById('category-tabs');
            container.innerHTML = `
                <div class="category-tab ${currentCategoryId === 'all' ? 'active' : ''}" onclick="filterByCategory('all')">Todos</div>
                ${categories.map(c => `
                    <div class="category-tab ${currentCategoryId === c.id ? 'active' : ''}" onclick="filterByCategory(${c.id})">${c.name}</div>
                `).join('')}
            `;
        }

        function filterByCategory(id) {
            currentCategoryId = id;
            renderCategories();
            filterProducts(); // Apply both category and search filters
        }

        function renderProducts(list) {
            const grid = document.getElementById('product-grid');
            const displayList = list || products; // Fallback to all if no list provided (though filterProducts will handle it)

            if (displayList.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; padding: 2rem; color: var(--gray);">Nenhum produto encontrado.</p>';
                return;
            }

            grid.innerHTML = displayList.map(p => `
                <div class="product-card" onclick="addToCart(${p.id})">
                    ${p.imageUrl ? `<img src="${formatImageUrl(p.imageUrl)}" class="product-img" onerror="this.onerror=null; this.outerHTML='<div class=\\'product-img\\' style=\\'display:flex;align-items:center;justify-content:center;color:#ccc;background:#f3f4f6;font-size:0.7rem;\\'>s/ foto</div>';">` : '<div class="product-img" style="display:flex;align-items:center;justify-content:center;color:#ccc">S/ FOTO</div>'}
                    <div class="product-info">
                        <h4>${p.name}</h4>
                        <p>${p.description || ''}</p>
                        <div class="product-price">${p.price.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}</div>
                    </div>
                </div>
            `).join('');
        }

        function filterProducts() {
            const term = document.getElementById('pdv-search').value.toLowerCase();
            const filtered = products.filter(p => {
                const matchesSearch = p.name.toLowerCase().includes(term) || (p.description && p.description.toLowerCase().includes(term));
                const matchesCategory = currentCategoryId === 'all' || p.categoryId === currentCategoryId;
                return matchesSearch && matchesCategory;
            });
            renderProducts(filtered);
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existing = cart.find(item => item.id === productId);

            if (existing) {
                existing.qty++;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            renderCart();
        }

        function updateQty(id, delta) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.qty += delta;
                if (item.qty <= 0) {
                    cart = cart.filter(i => i.id !== id);
                }
                renderCart();
            }
        }

        function calculateChange() {
            const total = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);
            const received = parseFloat(document.getElementById('cash-received').value) || 0;
            const display = document.getElementById('change-display');
            const changeSpan = document.getElementById('cart-change');

            if (received > total) {
                const change = received - total;
                changeSpan.textContent = change.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                display.style.display = 'block';
            } else {
                display.style.display = 'none';
            }
        }

        function renderCart() {
            const list = document.getElementById('cart-items');
            if (cart.length === 0) {
                list.innerHTML = '<p class="text-secondary" style="text-align: center; margin-top: 2rem;">Carrinho Vazio</p>';
                document.getElementById('cart-total').textContent = 'R$ 0,00';
                document.getElementById('change-display').style.display = 'none';
                document.getElementById('cash-received').value = '';
                return;
            }

            let total = 0;
            list.innerHTML = cart.map(item => {
                const subtotal = item.price * item.qty;
                total += subtotal;
                return `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <h5>${item.name}</h5>
                            <span style="font-size: 0.85rem; font-weight: 700; color: var(--primary);">${item.price.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}</span>
                            <div class="cart-item-qty">
                                <button class="qty-btn" onclick="updateQty(${item.id}, -1)">-</button>
                                <span>${item.qty}</span>
                                <button class="qty-btn" onclick="updateQty(${item.id}, 1)">+</button>
                            </div>
                        </div>
                        <div style="font-weight: 700;">${subtotal.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}</div>
                    </div>
                `;
            }).join('');

            document.getElementById('cart-total').textContent = total.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            document.getElementById('mobile-cart-badge').textContent = cart.reduce((acc, item) => acc + item.qty, 0);
            calculateChange(); // Recalcular troco ao mexer no carrinho
        }

        function clearCart() {
            if (confirm('Deseja limpar o carrinho?')) {
                cart = [];
                renderCart();
            }
        }

        let allTables = [];
        let selectedTableId = null;

        async function loadTables() {
            try {
                const token = localStorage.getItem('pdv_token');
                const res = await fetch(`${API_URL}/tables`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    allTables = await res.json();
                    renderTableSelect();
                }
            } catch (e) { console.error('Erro ao buscar mesas'); }
        }

        function renderTableSelect() {
            const select = document.getElementById('cart-table');
            const currentVal = select.value;
            select.innerHTML = '<option value="">Venda Direta (Balcão)</option>';
            allTables.forEach(t => {
                const status = t.isOccupied ? '🔴 OCUPADA' : '🟢 LIVRE';
                select.innerHTML += `<option value="${t.id}" ${currentVal == t.id ? 'selected' : ''}>Mesa ${t.number} (${status})</option>`;
            });
        }

        async function handleTableSelection() {
            const select = document.getElementById('cart-table');
            selectedTableId = select.value ? parseInt(select.value) : null;

            const btnFinish = document.getElementById('btn-finish');
            const btnKitchen = document.getElementById('btn-kitchen');
            const info = document.getElementById('table-status-info');

            if (!selectedTableId) {
                btnFinish.style.display = 'block';
                btnFinish.textContent = 'FINALIZAR VENDA (F10)';
                btnKitchen.style.display = 'none';
                info.style.display = 'none';
                return;
            }

            const table = allTables.find(t => t.id === selectedTableId);
            if (table && table.isOccupied) {
                btnFinish.textContent = 'FECHAR CONTA / PAGAR (F10)';
                btnFinish.style.display = 'block';
                btnKitchen.style.display = 'block';
                btnKitchen.textContent = 'ADICIONAR À COZINHA';

                info.style.display = 'block';
                info.style.background = '#fee2e2';
                info.style.color = '#991b1b';
                info.innerHTML = `⚠️ <strong>Mesa ${table.number} Ocupada</strong>. Carregando consumo...`;

                await loadTableOrder(selectedTableId);
                info.innerHTML = `⚠️ <strong>Mesa ${table.number} Ocupada</strong>. Finalize o pagamento para liberar.`;
            } else {
                // Table is free - ensure cart is cleared of previous consumption
                if (cart.some(i => i.fromOrder)) {
                    cart = [];
                    renderCart();
                }

                // For mobile: if a free table is selected, switch to catalog to pick products
                if (window.innerWidth < 992) switchMobileTab('catalog');

                btnFinish.style.display = 'none';
                btnKitchen.style.display = 'block';
                btnKitchen.textContent = 'ENVIAR PARA COZINHA';

                info.style.display = 'block';
                info.style.background = '#d1fae5';
                info.style.color = '#065f46';
                info.innerHTML = `✅ <strong>Mesa ${table?.number} Disponível</strong>.`;
            }
        }

        async function sendToKitchen() {
            if (cart.length === 0) return alert('O carrinho está vazio!');
            if (!selectedTableId) return alert('Selecione uma mesa para enviar à cozinha.');

            const btn = document.getElementById('btn-kitchen');
            btn.disabled = true;
            btn.textContent = 'ENVIANDO...';

            const newItems = cart.filter(i => !i.fromOrder);
            if (newItems.length === 0) return alert('Não há novos itens para enviar à cozinha.');

            const payload = {
                tenantId: tenant.id,
                customerName: document.getElementById('cart-customer').value || `Mesa ${allTables.find(t => t.id === selectedTableId)?.number}`,
                customerPhone: '0000000000',
                fulfillmentType: 'dine_in',
                tableId: selectedTableId,
                status: 'preparing',
                items: newItems.map(i => ({ productId: i.id, quantity: i.qty }))
            };

            try {
                const token = localStorage.getItem('pdv_token');
                const res = await fetch(`${API_URL}/orders`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    alert('🔥 Pedido enviado para a Cozinha!');
                    await loadTables();
                    await handleTableSelection();
                } else {
                    const err = await res.json();
                    alert('Erro: ' + err.error);
                }
            } catch (e) { alert('Erro ao enviar para cozinha.'); }
            finally { btn.disabled = false; }
        }

        async function finishOrder() {
            if (cart.length === 0 && !selectedTableId) return alert('O carrinho está vazio!');

            const btn = document.getElementById('btn-finish');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'PROCESSANDO...';

            const payload = {
                tenantId: tenant.id,
                customerName: document.getElementById('cart-customer').value || (selectedTableId ? `Mesa ${allTables.find(t => t.id === selectedTableId)?.number}` : 'Cliente Balcão'),
                customerPhone: '0000000000',
                fulfillmentType: selectedTableId ? 'dine_in' : 'counter',
                paymentMethod: document.getElementById('cart-payment').value,
                tableId: selectedTableId,
                status: 'finished',
                items: cart.filter(i => !i.fromOrder).map(i => ({ productId: i.id, quantity: i.qty })) // Only new items
            };

            try {
                const token = localStorage.getItem('pdv_token');

                // If there are existing orders for this table, finish them first
                if (selectedTableId && currentTableOrderIds.length > 0) {
                    const statusPromises = currentTableOrderIds.map(orderId =>
                        fetch(`${API_URL}/orders/${orderId}/status`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                            body: JSON.stringify({ status: 'finished' })
                        })
                    );
                    await Promise.all(statusPromises);
                }

                // If no new items, just skip the order creation and refresh
                if (payload.items.length === 0 && selectedTableId) {
                    alert('✅ Mesa liberada e consumo finalizado!');
                    cart = [];
                    currentTableOrderIds = [];
                    document.getElementById('cart-table').value = ""; // Reset selection
                    selectedTableId = null;
                    renderCart();
                    await loadTables();
                    handleTableSelection();
                    btn.disabled = false;
                    btn.textContent = originalText;
                    return;
                }

                const res = await fetch(`${API_URL}/orders`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    const result = await res.json();
                    alert('✅ Venda finalizada e Mesa liberada!');
                    if (confirm('Deseja imprimir o recibo?')) {
                        window.open(`${API_URL}/orders/${result.order.id}/receipt?token=${token}`, '_blank');
                    }
                    cart = [];
                    currentTableOrderIds = [];
                    document.getElementById('cart-customer').value = '';
                    document.getElementById('cart-table').value = ""; // Reset selection
                    selectedTableId = null;
                    renderCart();
                    await loadTables();
                    handleTableSelection();
                } else {
                    const err = await res.json();
                    alert('Erro: ' + err.error);
                }
            } catch (e) { alert('Erro ao finalizar venda.'); }
            finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        }

        function logoutPDV() {
            localStorage.removeItem('pdv_token');
            localStorage.removeItem('pdv_tenant');
            window.location.reload();
        }

        // Cash Register Functions
        let currentCashType = 'inflow';

        function openCashModal(type) {
            currentCashType = type;
            const title = type === 'inflow' ? 'Reforço de Caixa 💰' : 'Sangria de Caixa 💸';
            document.getElementById('modal-title').textContent = title;
            document.getElementById('cash-modal').style.display = 'flex';
        }

        function closeCashModal() {
            document.getElementById('cash-modal').style.display = 'none';
            document.getElementById('cash-amount').value = '';
            document.getElementById('cash-desc').value = '';
        }

        async function submitCashEvent() {
            const amount = parseFloat(document.getElementById('cash-amount').value);
            const description = document.getElementById('cash-desc').value;

            if (isNaN(amount) || amount <= 0) return alert('Informe um valor válido.');

            try {
                const token = localStorage.getItem('pdv_token');
                const res = await fetch(`${API_URL}/cash-register/events`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        type: currentCashType,
                        amount,
                        description
                    })
                });

                if (res.ok) {
                    alert('Evento de caixa registrado com sucesso!');
                    closeCashModal();
                } else {
                    alert('Erro ao registrar evento.');
                }
            } catch (e) { alert('Erro na conexão com o servidor.'); }
        }
    </script>

    <!-- Modal de Caixa -->
    <div id="cash-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Movimentação de Caixa</h2>
            </div>
            <div class="form-group">
                <label>VALOR (R$)</label>
                <input type="number" id="cash-amount" step="0.01" placeholder="0,00">
            </div>
            <div class="form-group">
                <label>DESCRIÇÃO / MOTIVO</label>
                <input type="text" id="cash-desc" placeholder="Ex: Troco inicial, Retirada para frete...">
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeCashModal()">CANCELAR</button>
                <button class="btn btn-primary" onclick="submitCashEvent()">CONFIRMAR</button>
            </div>
        </div>
    </div>
</body>

</html>
